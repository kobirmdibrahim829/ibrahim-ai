<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Ibrahim Kabir | AI Portfolio</title>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:
      radial-gradient(circle at top left,#1e3c72,#0f2027 40%),
      radial-gradient(circle at bottom right,#2a5298,#000428 50%);

      color:white;
      overflow-x:hidden;
      min-height:100vh;
    }

    header{
      width:100%;
      padding:20px 50px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:fixed;
      top:0;

      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(15px);

      border-bottom:1px solid rgba(255,255,255,0.1);

      z-index:1000;
    }

    .logo{
      font-size:30px;
      font-weight:bold;
      color:#7df9ff;
    }

    nav a{
      color:white;
      margin-left:20px;
      text-decoration:none;
    }

    .hero{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding-top:120px;
    }

    .profile-pic{
      width:200px;
      height:200px;
      border-radius:50%;
      border:5px solid #7df9ff;
      box-shadow:0 0 30px #7df9ff;
      margin-bottom:20px;
      object-fit:cover;
    }

    .btn{
      padding:10px 16px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,#7df9ff,#00c9ff,#92fe9d);
      color:#000;
      cursor:pointer;
      margin:5px;
      font-weight:bold;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.05);
      box-shadow:0 0 15px #7df9ff;
    }

    #loginBox{
      width:300px;
      margin:auto;
      background:rgba(255,255,255,0.05);
      padding:20px;
      border-radius:15px;
      text-align:center;
      margin-top:50px;
    }

    .input-box{
      width:100%;
      padding:12px;
      margin:10px 0;
      border-radius:10px;
      border:none;
      outline:none;
    }

    .phone-frame{
      width:350px;
      height:600px;
      margin:auto;

      background:rgba(0,0,0,0.6);

      border-radius:35px;
      padding:15px;

      border:2px solid #7df9ff;

      box-shadow:
      0 0 20px #7df9ff,
      0 0 50px rgba(125,249,255,0.4);

      backdrop-filter:blur(10px);
    }

    .chat-box{
      scroll-behavior:smooth;
      height:400px;
      overflow-y:auto;
      background:rgba(255,255,255,0.05);
      padding:15px;
      border-radius:15px;
      border:1px solid rgba(255,255,255,0.1);
    }

    .user-msg{
      text-align:right;
      margin:10px;
      color:#fff;
      word-wrap:break-word;
    }

    .bot-msg{
      text-align:left;
      margin:10px;
      color:#7df9ff;
      word-wrap:break-word;
    }

    .light-mode{
      background:white;
      color:black;
    }

  </style>
</head>

<body>

<header>

  <div class="logo">Ibrahim Kabir AI</div>

  <nav>
    <a href="#">Home</a>
    <a href="#chatbot">AI Chat</a>
    <a href="#">About</a>
  </nav>

  <button class="btn" onclick="toggleTheme()">🌙 Theme</button>

</header>

<section class="hero">

  <img src="mypic.jpg" class="profile-pic">

  <h1>Hello I'm Ibrahim Kabir</h1>

  <button class="btn" onclick="startVoice()">🎤 Speak</button>

</section>

<section id="loginBox">

  <h2>Login</h2>

  <input
    class="input-box"
    id="username"
    placeholder="Username"
  >

  <input
    class="input-box"
    id="password"
    type="password"
    placeholder="Password"
  >

  <button class="btn" onclick="login()">Login</button>

</section>

<section id="chatbot" style="display:none; margin-bottom:50px;">

  <div class="phone-frame">

    <div class="chat-box" id="chat"></div>

    <div style="display:flex;gap:8px;margin-top:10px;">
      <button class="btn" onclick="clearChat()">🗑 Clear</button>
      <button class="btn" onclick="downloadChat()">💾 Save</button>
    </div>

    <input
      class="input-box"
      id="msg"
      placeholder="Type message"
    >

    <button class="btn" onclick="send()">Send</button>

    <button class="btn" onclick="startVoice()">🎤 Voice</button>

  </div>

</section>

<script>

// ---------- Voice ----------
function speak(text){

  window.speechSynthesis.cancel();

  const speech = new SpeechSynthesisUtterance(text);

  speech.rate = 0.9;
  speech.pitch = 1;
  speech.volume = 1;

  const isBangla = /[ঀ-৿]/.test(text);

  speech.lang = isBangla ? "bn-BD" : "en-US";

  const voices = window.speechSynthesis.getVoices();

  let selectedVoice = null;

  if(isBangla){

    selectedVoice =
      voices.find(v => v.lang.includes("bn")) ||
      voices[0];

  }else{

    selectedVoice =
      voices.find(v => v.lang.includes("en")) ||
      voices[0];

  }

  if(selectedVoice){
    speech.voice = selectedVoice;
  }

  window.speechSynthesis.speak(speech);
}

window.speechSynthesis.onvoiceschanged = () => {
  window.speechSynthesis.getVoices();
};

// ---------- Voice Input ----------
function startVoice(){

  const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("Voice recognition not supported");
    return;
  }

  let rec = new SpeechRecognition();

  rec.lang = "bn-BD";

  rec.start();

  rec.onresult = function(e){

    document.getElementById("msg").value =
      e.results[0][0].transcript;

    send();
  };
}

// ---------- Login ----------
function login(){

  let u = document.getElementById("username").value;
  let p = document.getElementById("password").value;

  if(u === "ibrahim" && p === "1234"){

    document.getElementById("loginBox").style.display = "none";

    document.getElementById("chatbot").style.display = "block";

    alert("Login Success 🚀");

  }else{

    alert("Wrong Login ❌");
  }
}

// ---------- Memory ----------
let chatHistory = [];

// ---------- Real Gemini AI ----------
async function getAIResponse(message){

  try{

    const res = await fetch("/chat",{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body: JSON.stringify({
        message: message
      })

    });

    if(!res.ok){
      throw new Error("Server Error");
    }

    const data = await res.json();

    return data.reply;

  }catch(error){

    console.log(error);

    return "❌ AI server connection error";
  }
}

// ---------- Send ----------
async function send(){

  let m = document.getElementById("msg");

  let chat = document.getElementById("chat");

  if(m.value.trim() === "") return;

  const userMessage = m.value;

  chat.innerHTML += `
    <div class='user-msg'>
      ${userMessage}
    </div>
  `;

  let typing = document.createElement("div");

  typing.className = "bot-msg";

  typing.innerText = "Typing... 🤖";

  chat.appendChild(typing);

  chat.scrollTop = chat.scrollHeight;

  m.value = "";

  let reply = await getAIResponse(userMessage);

  setTimeout(()=>{

    typing.innerText = reply;

    speak(reply);

    chat.scrollTop = chat.scrollHeight;

    saveMessages();

  },400);
}

// ---------- Save Chat ----------
function saveMessages(){

  localStorage.setItem(
    "ibrahim_ai_chat",
    document.getElementById("chat").innerHTML
  );
}

// ---------- Load Chat ----------
function loadMessages(){

  let saved =
    localStorage.getItem("ibrahim_ai_chat");

  if(saved){

    document.getElementById("chat").innerHTML =
      saved;
  }
}

// ---------- Clear Chat ----------
function clearChat(){

  document.getElementById("chat").innerHTML = "";

  localStorage.removeItem("ibrahim_ai_chat");
}

// ---------- Download Chat ----------
function downloadChat(){

  let text =
    document.getElementById("chat").innerText;

  let blob = new Blob([text],{
    type:"text/plain"
  });

  let a = document.createElement("a");

  a.href = URL.createObjectURL(blob);

  a.download = "ibrahim-ai-chat.txt";

  a.click();
}

// ---------- Theme ----------
function toggleTheme(){

  document.body.classList.toggle("light-mode");
}

// ---------- Load ----------
window.onload = () => {

  loadMessages();
};

// ---------- Enter Key ----------
document.addEventListener("keydown", function(e){

  if(e.key === "Enter"){

    send();
  }
});

</script>

</body>
</html>
